name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml
      # Pinned. Unpinned, this job installed whatever ruff shipped that morning,
      # and a new release with new rules or a new formatting style turned the
      # whole repository red through nobody's edit. Bump this deliberately.
      - name: Install dependencies
        run: pip install -e ".[dev]" ruff==0.15.21
      - name: Run ruff check
        run: ruff check .
      - name: Run ruff format check
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]" mypy
      - name: Run mypy on the strictly-typed modules
        run: |
          mypy --strict --explicit-package-bases \
            app/event_bus \
            app/worker \
            app/auth/oauth \
            app/auth/cerbos_client.py \
            app/api/v1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov
      - name: Run tests with coverage
        run: pytest -q --ignore=tests/integration --cov=app --cov-report=term-missing --cov-report=xml
      - name: Coverage threshold (warn-only at <70%)
        run: |
          total=$(python -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); print(int(float(r.attrib['line-rate'])*100))")
          echo "coverage=${total}%"
          if [ "$total" -lt 70 ]; then
            echo "::warning::Coverage ${total}% is below 70%"
          fi

  # The suite used to pass in exactly one collection order — the alphabetical one
  # it happened to have — because seven pieces of process-wide state leaked from
  # each test into the next. Renaming a few files was enough to turn 57 of them
  # red. A green run in one order proves nothing on its own, so this job runs the
  # files in the opposite order and the two have to agree.
  test-reverse-order:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run the suite backwards
        run: pytest -q --tb=line $(ls tests/*.py | sort -r | tr '\n' ' ')

  # The panel had no CI at all. 231 vitest tests and a clean `tsc` ran only on a
  # laptop, so nothing stopped a merge that broke the console — including the
  # guard tests that exist specifically to stop the panel inventing data it
  # failed to fetch. A test that cannot fail a pull request is a note to self.
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: core/landing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/landing/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run

  # Nothing in this repository had ever checked its dependencies. By the time
  # anyone looked, the request path was carrying published advisories in the JWT
  # library, the form parser, the HTTP client and the PDF reader — the four
  # places a stranger's bytes actually land. This job is what stops that from
  # being discovered by a customer.
  dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/landing/package-lock.json
      - name: Audit Python dependencies
        working-directory: core/backend
        # PYSEC-2026-311 is a code-injection bug in ChromaDB's *server* HTTP API
        # (/api/v2/.../collections with trust_remote_code). We embed ChromaDB as a
        # PersistentClient; that endpoint is never served. There is no fixed
        # release to move to. Revisit if we ever run Chroma as a server.
        run: |
          pip install -e ".[dev]"
          pip-audit --progress-spinner off --ignore-vuln PYSEC-2026-311
      - name: Audit npm dependencies
        working-directory: core/landing
        run: npm audit --audit-level=moderate

  # `tests/integration` ran nowhere. The Qdrant test is the one that asserts a
  # customer cannot read another customer's vectors, and the Cerbos test is the
  # one that asserts a cross-tenant request is DENIED — the two properties a
  # buyer would most want proof of. Both skip themselves when their service is
  # unreachable, which on a laptop with nothing running means they always
  # skipped, and in CI meant they never ran at all.
  #
  # So: bring the services up, and *check they are up* before the suite runs.
  # A skipped isolation test looks exactly like a passing one in the summary.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      qdrant:
        image: qdrant/qdrant:v1.10.0
        ports:
          - 6333:6333
    env:
      ABS_QDRANT_URL: http://127.0.0.1:6333
      ABS_CERBOS_HOST: http://127.0.0.1:3592
    steps:
      - uses: actions/checkout@v4
      - name: Start Cerbos with this repo's policies
        run: |
          docker run -d --name cerbos -p 3592:3592 \
            -v "${{ github.workspace }}/infra/cerbos:/etc/cerbos:ro" \
            ghcr.io/cerbos/cerbos:0.40.0 \
            server --config=/etc/cerbos/config.yaml
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml
      - name: Install dependencies
        working-directory: core/backend
        run: pip install -e ".[dev]"
      - name: Wait for the services, and fail if they never arrive
        run: |
          for i in $(seq 1 30); do
            qdrant=$(curl -fsS http://127.0.0.1:6333/readyz >/dev/null 2>&1 && echo up || echo down)
            cerbos=$(curl -fsS http://127.0.0.1:3592/_cerbos/health >/dev/null 2>&1 && echo up || echo down)
            [ "$qdrant" = up ] && [ "$cerbos" = up ] && echo "both up" && exit 0
            sleep 2
          done
          echo "::error::qdrant=$qdrant cerbos=$cerbos — the isolation tests would have skipped themselves"
          docker logs cerbos || true
          exit 1
      - name: Cross-tenant isolation (Qdrant + Cerbos)
        working-directory: core/backend
        # A skip here is a failure, not a pass. It means the service was not
        # reached and the isolation property went unverified — and a skipped
        # isolation test reads exactly like a passing one in the summary line.
        run: |
          set -o pipefail
          pytest -q tests/integration/test_qdrant_isolation.py \
                    tests/integration/test_cerbos_live.py \
                    -o addopts='' --no-header -rs 2>&1 | tee out.txt
          if grep -qE '[0-9]+ skipped' out.txt; then
            echo "::error::an isolation test skipped itself — the property was not checked"
            exit 1
          fi

  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ABS_DATABASE_URL: sqlite:///${{ runner.temp }}/abs.db
    defaults:
      run:
        working-directory: core/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Alembic upgrade head + downgrade base
        run: |
          alembic -c alembic.ini upgrade head
          alembic -c alembic.ini downgrade base
