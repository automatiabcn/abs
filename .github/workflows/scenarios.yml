name: Scenarios (end to end)

# The fourteen scenario specs use the product the way a customer does: install
# the server through the setup wizard, sign in, ask it a question, ingest a
# document, approve an action, revoke a key. They are the only tests here that
# talk to a real backend with a real cascade behind it — everything else mocks
# the network, which is right for a component test and useless for the question
# these exist to answer: does a person who installs this get an answer out of it.
#
# They gated nothing. No config collected them, no job ran them, and the last
# time they were run at all was against a laptop where the product had been
# installed months earlier — so they could only ever run where it already worked,
# which is the one place a test can tell you nothing. The first time they were
# pointed at an empty server, the login form failed and the other thirty-three
# never started.
#
# A provider key is required, not optional: a scenario that asks a question and
# reads the answer cannot be run against a server that has no one to ask. Without
# the secret this job FAILS — it does not skip. A suite that skips itself when the
# thing it tests is absent reports green for a system that never ran, and this
# repository has been bitten by exactly that before.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: scenarios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scenarios:
    # A fork's pull request, and Dependabot's, cannot see the repository's
    # secrets — by design, and rightly. There is no key for them to ask a question
    # with, so the run is not scheduled at all rather than scheduled and faked.
    # Every push to main still goes through it, with the key, for real.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      qdrant:
        image: qdrant/qdrant:v1.10.0
        ports:
          - 6333:6333
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ABS_QDRANT_URL: http://127.0.0.1:6333
      ABS_BACKEND_URL: http://127.0.0.1:8000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3458
    steps:
      - uses: actions/checkout@v4

      - name: The key the scenarios ask their questions with
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::GROQ_API_KEY is not set. The scenarios install a server and ask it a question; without a provider key there is nobody to ask, and a skipped run would report green for a product that never answered. Add the secret."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: core/backend/pyproject.toml
      - name: Install the backend
        working-directory: core/backend
        run: pip install -e ".[dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/landing/package-lock.json
      - name: Install the frontend
        working-directory: core/landing
        run: npm ci

      # A venv, because the launcher runs uvicorn out of one — the same script a
      # person runs on their own machine, so the two cannot drift apart.
      - name: Start an empty server
        working-directory: core/backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
          nohup ./scripts/run_e2e_backend.sh > e2e-backend.log 2>&1 &
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1 && echo "up" && exit 0
            sleep 2
          done
          echo "::error::the backend never came up"
          cat e2e-backend.log
          exit 1

      - name: Build and serve the panel
        working-directory: core/landing
        run: |
          nohup npx next dev --port 3458 --hostname 127.0.0.1 > next.log 2>&1 &
          for i in $(seq 1 90); do
            curl -fsS http://127.0.0.1:3458/login >/dev/null 2>&1 && echo "up" && exit 0
            sleep 2
          done
          echo "::error::the panel never came up"
          cat next.log
          exit 1

      - name: Install the browser
        working-directory: core/landing
        run: npx playwright install --with-deps chromium

      - name: Install the server through its own wizard, then use it
        working-directory: core/landing
        run: npm run test:e2e:scenarios

      - name: What the server said while it was failing
        if: failure()
        run: tail -200 core/backend/e2e-backend.log || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: scenario-traces
          path: core/landing/test-results/
          retention-days: 7
