site_name: Automatia ABS Documentation
site_url: https://docs.automatiabcn.com/
site_description: Self-host AI orchestration for Claude Code — 100+ MCP tools, 6 provider cascade, RAG hybrid, multilingual quality pipelines.
site_author: Automatia BCN
repo_url: https://github.com/automatiabcn/abs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Setup Guide: setup-guide.md
  - Quickstart (30 min): quickstart-30min.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Operations:
      - Billing Runbook: billing-runbook.md
      - Operations: operations.md
      - Troubleshooting: troubleshooting.md
      - Disaster Recovery: dr-runbook.md
      - Vault Recovery: vault-recovery-runbook.md
      - Webhook Rotation: webhook-rotation-runbook.md
      - Performance: performance.md
  - Security:
      - Scope: security/scope.md
      - OWASP + RAG Checklist: security/owasp_rag_checklist.md
      - OAuth Pen-Test: security/oauth_pentest.md
      - HackerOne Program: security/hackerone_program.md
      - Index: security/README.md
  - QA & Policy:
      - Perf Budget: qa/perf-budget-policy.md
      - i18n Policy: qa/i18n-policy.md
      - fs-scan Allowlist Policy: qa/fs-scan-allowlist-policy.md
      - Docs Publishing Policy: qa/docs-publishing-policy.md
      - Beta E2E Policy: qa/beta-e2e-policy.md
  - API Reference:
      - Scalar (interactive): api-reference.md
  - Design:
      - Decisions: design-decisions.md
  - FAQ: faq.md
  - CHANGELOG: CHANGELOG.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Version selector (mike).
  # Install with: pip install mike mkdocs-material[imaging]
  - mike:
      alias_type: copy
      canonical_version: latest
  # Removed the previous `algolia_docsearch:` plugin
  # entry. It referenced a PyPI package `mkdocs-algolia-docsearch` that
  # was never published, so `pip install mkdocs-algolia-docsearch>=0.4`
  # in .github/workflows/docs.yml had failed on every run since the docs
  # site was introduced. MkDocs Material's built-in `search`
  # plugin (lunr.js) covers site search until a proper integration is
  # wired up.
  #
  # To re-enable Algolia DocSearch in the future, follow the official
  # MkDocs Material guide — it is a template override, not a PyPI
  # plugin: override `partials/integrations/analytics.html` (or use
  # `extra.search.algolia.*`) and load the Algolia-hosted JS bundle.
  #   https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/#integration-with-algolia-docsearch

docs_dir: docs
site_dir: site
strict: false

# Validation tolerance. Several docs intentionally
# reference source files outside docs/ (`../core/backend/app/...`,
# `../../LICENSE`, `../../.github/workflows/...`) as pointer references;
# MkDocs `--strict` mode flags every one of these as "target not found
# among documentation files". Downgrade those classes to `info` so the
# strict build doesn't fail on intentional out-of-tree pointers, while
# anchor + true broken-link issues still surface.
validation:
  links:
    not_found: info
    anchors: info
    absolute_links: info
    unrecognized_links: info

exclude_docs: |
  README.md
