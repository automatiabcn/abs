# Cloudflare Worker — ABS license activation server
#
# Setup (founder, one-time):
#   npm install -g wrangler
#   wrangler login
#
# Deploy:
#   cd infra/cf-worker
#   wrangler deploy
#
# Tail live logs:
#   wrangler tail abs-license-activation
#
# Free tier post-2026-04 daily limits:
#   100,000 reads / 1,000 writes / 1,000 deletes / 1,000 lists
# Worker-side throttle (1h activation last_seen rewrite) keeps each customer
# instance under ~24 writes/day. Read budget is the binding scaling
# constraint — paid plan ($5/mo) lifts to 10M reads + 1M writes.

name = "abs-license-activation"
main = "license-activation.js"
compatibility_date = "2026-05-10"

# KV namespace binding consumed in code as `env.ABS_LICENSE_KV`.
# `abs-license-state` namespace.
[[kv_namespaces]]
binding = "ABS_LICENSE_KV"
id = "58aec9f5ab714a2ba3ee2be9b7357ede"
