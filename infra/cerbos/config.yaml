# Cerbos policy decision point — the engine behind cross-tenant authorization.
# The compose files bind-mount this directory read-only at /etc/cerbos, so the
# policies below resolve to /etc/cerbos/policies, and the audit log stays inside
# the container's own writable layer.

server:
  httpListenAddr: ":3592"
  grpcListenAddr: ":3593"
  metricsEnabled: true
  playgroundEnabled: false

storage:
  driver: "disk"
  disk:
    directory: /etc/cerbos/policies
    watchForChanges: true

audit:
  enabled: true
  backend: local
  accessLogsEnabled: true
  decisionLogsEnabled: true
  local:
    storagePath: /tmp/cerbos-audit

engine:
  defaultPolicyVersion: "default"
  lenientScopeSearch: true

schema:
  enforcement: "warn"

# Cerbos reports anonymous usage to its vendor unless told not to. The compose
# already disables Next's telemetry on customer hosts for privacy and air-gap;
# the policy engine has to hold the same line, or a self-hosted install still
# talks to the internet on boot.
telemetry:
  disabled: true
